<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Resumen anonimizado de una exportación de Screaming Frog</title>
  <desc id="desc">Rastreo del 8 de junio de 2026 limitado a 500 recursos y 143 páginas HTML, con los principales problemas técnicos encontrados.</desc>
  <rect width="1200" height="760" fill="#111c31"/>
  <rect width="8" height="760" fill="#e34b31"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="48" y="60" fill="#fb8c74" font-size="13" font-weight="800">SCREAMING FROG SEO SPIDER 23.0</text>
    <text x="48" y="105" fill="#f8fafc" font-size="34" font-weight="800">Resumen de rastreo técnico anonimizado</text>
    <text x="1152" y="61" fill="#9fb0c7" font-size="14" text-anchor="end">08/06/2026</text>
    <text x="1152" y="84" fill="#9fb0c7" font-size="14" text-anchor="end">500 recursos · 143 páginas HTML</text>
    <line x1="48" y1="132" x2="1152" y2="132" stroke="#334155"/>

    <g transform="translate(48 158)">
      <g>
        <rect width="267" height="94" rx="6" fill="#18253a" stroke="#334155"/>
        <text x="18" y="48" fill="#ffffff" font-size="31" font-weight="800">99</text>
        <text x="18" y="73" fill="#9fb0c7" font-size="13">metadescripciones ausentes</text>
      </g>
      <g transform="translate(279)">
        <rect width="267" height="94" rx="6" fill="#18253a" stroke="#334155"/>
        <text x="18" y="48" fill="#ffffff" font-size="31" font-weight="800">84</text>
        <text x="18" y="73" fill="#9fb0c7" font-size="13">imágenes sin texto alternativo</text>
      </g>
      <g transform="translate(558)">
        <rect width="267" height="94" rx="6" fill="#18253a" stroke="#334155"/>
        <text x="18" y="48" fill="#ffffff" font-size="31" font-weight="800">36</text>
        <text x="18" y="73" fill="#9fb0c7" font-size="13">titles de más de 60 caracteres</text>
      </g>
      <g transform="translate(837)">
        <rect width="267" height="94" rx="6" fill="#18253a" stroke="#334155"/>
        <text x="18" y="48" fill="#ffffff" font-size="31" font-weight="800">5</text>
        <text x="18" y="73" fill="#9fb0c7" font-size="13">URLs internas con respuesta 404</text>
      </g>
    </g>

    <g transform="translate(48 276)">
      <rect width="1104" height="320" rx="6" fill="#162238" stroke="#334155"/>
      <rect width="1104" height="48" rx="6" fill="#1d2b42"/>
      <text x="16" y="30" fill="#9fb0c7" font-size="12" font-weight="800">PROBLEMA DETECTADO</text>
      <text x="480" y="30" fill="#9fb0c7" font-size="12" font-weight="800">URLS</text>
      <text x="580" y="30" fill="#9fb0c7" font-size="12" font-weight="800">IMPACTO</text>
      <text x="730" y="30" fill="#9fb0c7" font-size="12" font-weight="800">RECOMENDACIÓN</text>

      <g fill="#d8e2ef" font-size="14">
        <text x="16" y="80">Metadescripción ausente</text><text x="480" y="80" fill="#fff" font-size="18" font-weight="800">99</text><text x="580" y="80" fill="#fecaca">Alto</text><text x="730" y="80">Priorizar snippets de páginas de captación.</text>
        <text x="16" y="125">Imagen sin texto alt</text><text x="480" y="125" fill="#fff" font-size="18" font-weight="800">84</text><text x="580" y="125" fill="#fde68a">Medio</text><text x="730" y="125">Describir imágenes informativas por lotes.</text>
        <text x="16" y="170">Title demasiado largo</text><text x="480" y="170" fill="#fff" font-size="18" font-weight="800">36</text><text x="580" y="170" fill="#fde68a">Medio</text><text x="730" y="170">Ajustar intención antes del posible truncado.</text>
        <text x="16" y="215">H1 ausente</text><text x="480" y="215" fill="#fff" font-size="18" font-weight="800">16</text><text x="580" y="215" fill="#fecaca">Alto</text><text x="730" y="215">Definir un encabezado principal descriptivo.</text>
        <text x="16" y="260">Redirección interna 3xx</text><text x="480" y="260" fill="#fff" font-size="18" font-weight="800">20</text><text x="580" y="260" fill="#fde68a">Medio</text><text x="730" y="260">Enlazar directamente a la URL final.</text>
        <text x="16" y="305">Error interno 404</text><text x="480" y="305" fill="#fff" font-size="18" font-weight="800">5</text><text x="580" y="305" fill="#fecaca">Alto</text><text x="730" y="305">Recuperar, redirigir o retirar enlaces rotos.</text>
      </g>
      <g stroke="#2a3950">
        <line x1="0" y1="96" x2="1104" y2="96"/><line x1="0" y1="141" x2="1104" y2="141"/>
        <line x1="0" y1="186" x2="1104" y2="186"/><line x1="0" y1="231" x2="1104" y2="231"/>
        <line x1="0" y1="276" x2="1104" y2="276"/>
      </g>
    </g>

    <g transform="translate(48 620)">
      <rect width="544" height="104" fill="#18253a"/>
      <rect width="3" height="104" fill="#38bdf8"/>
      <text x="20" y="28" fill="#ffffff" font-size="13" font-weight="800">LECTURA</text>
      <text x="20" y="53" fill="#aebdd0" font-size="13">Las incidencias se concentran en control del mensaje,</text>
      <text x="20" y="74" fill="#aebdd0" font-size="13">accesibilidad de imágenes y consistencia semántica.</text>
      <g transform="translate(560)">
        <rect width="544" height="104" fill="#18253a"/>
        <rect width="3" height="104" fill="#38bdf8"/>
        <text x="20" y="28" fill="#ffffff" font-size="13" font-weight="800">DECISIÓN</text>
        <text x="20" y="53" fill="#aebdd0" font-size="13">Resolver primero 404, H1 y snippets de captación;</text>
        <text x="20" y="74" fill="#aebdd0" font-size="13">después imágenes, titles y redirecciones por lotes.</text>
      </g>
    </g>
  </g>
</svg>
